body:
  text: 烏戍釋行霆述昔鄣南煥師謂凡列天位失尊卑之序無昭穆之儀歎其習俗既久未有刊正其事者因撿大藏作諸天列傳然草創之功良可尚也但其列位之次及各為傳詞多從己意至于經論顯文而不録入今事筆削以全始終於是去繁凡輔闕略以輔先志孤山嘗曰後之病今亦猶今之病昔儻有未安更俟來哲庶使天神呵護之迹大權垂應之本無失其正而歸于是而已時乾道癸巳仲秋之晦於福田西華嚴蘭若志息總別位次之諍百録之文乃云大梵尊天三十三天護世四王金剛密迹散脂大將大辨天神功德天神訶利帝南鬼子母等五百眷屬此依光明鬼神品等前後收束以列之也四明法師移功德大辨二位在後別召乃準散脂品中之文故也慈雲法師獨移功德天女在後別召乃準功德天品供養佛已別以香華種種美味供施於我由此今古各據經文互相排斥今為息諍者以經論質之凡列天位自有兩端一如常佛會總相排列當先梵王帝釋四王等如百録所次蓋非一席之設如光明中前後之文非一以總別故也又如孔經索訶世界主梵天王天帝釋四天王二十八大藥叉乃云餘經文非一處此猶世之朝儀尊卑高下各安其位雖間有不次必先梵釋者世界主故佛八相中先守護故二專修金光明依功德天教以祈福力助於説聽當特設功德大辨之像於佛座之左右次以梵釋四王別分首排列此猶世之選用良將特旌異之而超於品類所以百録令於佛座之左右安功德天像意在只奉此天依經文別敷好座以待於我故也然後百録又云若道場寬更安大辨四天王座所以後人又加梵釋等是知止一席之設非常儀耳又其如常自古列十六天像者皆選其上首各有所主又約言行明顯訶護殊功其所主者雖各不同生善滅惡其實同也又若約其本無非皆是大菩薩等若以列次莫非就迹又十六位中如摩醯首羅當有二神今之所供乃大自在天尊特之主非藥叉中同名之者又訶利帝南鬼子母神本只一位或分二天具如本傳以詳明之今先出如常佛會所主之次者娑婆界主號令獨尊大梵天王男地居世主忉利稱王帝釋尊天男北方護世大藥叉王多聞尊天男東方護世鳩槃茶主增長尊天男西方護世為大龍王廣目天王男親伏怨魔誓為力士金剛密迹尊特之主居色頂天魔醯首羅二十八部總領鬼神散脂大將男能與總持大智慧聚大辨財天女隨其所求令得成就大功德天女殷憂四部外護三洲韋馱天神男增長出生證明功德堅牢地神女覺場垂廕因果互嚴菩提樹神女生諸鬼王保護男女鬼子母神女行日月前救兵戈難摩利支天已上凡十六位也又有添為二十位者百名利生千光破暗日宮天子星主宿王清涼照夜月宮天子祕藏法寶主執群龍娑竭羅王掌幽陰權為地獄主閻摩羅王又有添入風水等神通前作三十三位目為三十三天者若更添多則無害但不應指作三十三天耳此上乃如常佛會排列之序若金光明道場之中則於佛左安功德天像右安大辨天像其梵釋等却就兩面別分首排列之也有識之士請熟思之尚恐未曉今示以圖庶列位既明自然無諍大梵天王傳言梵王者語略故也西域云𭊃囕摩此翻離欲或云清淨或云極淨楞嚴經云身心妙圓威儀不闕清淨禁戒加以明悟是人應時能統梵衆為大梵王自他化天之上即有四禪凡十八天於初禪中有乎三天所謂梵衆梵輔及大梵也雖上有三禪一十五天內無雜想外無語言唯味禪悅皆梵天統故楞嚴云其次梵天統攝梵人圓滿梵行法華文句云梵王號令總上冠下荊溪云梵即色界主亦三界主餘皆臣屬良由此天內有覺觀外有語言故也華嚴稱梵王主小千界由居小千之中法華稱娑婆界主主大千界乃居大千之中故統餘界是知橫則統小千大千竪則總上冠下總稱王號其別名者梵語尸棄此云頂髻亦翻螺髻由肉髻似螺法華文句云外國稱火為樹提尸棄由此王本修火光定破欲界惑俱舍論云大梵天王無別處所但於梵輔天中高樓閣者名大梵王身量長一踰繕那半身白銀色宮殿衣服皆黃金色壽命一劫半阿含經云諸梵來下並同人形經律異相云梵王顏如童子法苑云色界諸天不著衣服如著不異頭雖無髻似如天冠無男女形相唯一種華嚴經中以十地對十王則梵王乃八地菩薩智論校量梵福云滿閻浮地人福不如西瞿耶尼一人福滿西瞿耶尼人福不如東弗喻逮一人福滿東弗喻逮人福不如北單越一人福乃至第六天衆福不如梵天一人福加修四量心報為天王求法傳云佛下忉利天時梵王在佛右邊手執白拂而下佛成道已以宮殿奉佛請轉法輪七佛呪經白佛若有人王欲護其國有災疫時持我此呪一心禪思念諸疫鬼速出其國諸經護法之類其文非一婆沙論云馬勝不知四大種當於何處盡滅無餘問至梵王王遂執馬勝手引出衆外云何不問佛華嚴經云梵王語音清妙一切梵衆各謂梵王獨與己言遠近同等涅槃云婆藪仙與梵王論義於其面門作三目示之劫章頌云獨住時經一增減後念民輔有情生即成劫之初梵王先生梵輔梵衆後生故彼計為我能生也維摩經梵王曰我見釋迦牟尼佛土如自在天宮似寶莊嚴佛土今之佛會所以列之居首者其意有五一是三界號令之主二是從佛下生之者三是請轉法輪之者四乃諸經弘護推先五以百録標請在初舊傳引擎雞持鈴六帖録問眼鑿眸既非顯要今不附録餘文例此然探玄記引俱舍論得梵福有七種一未造支提於中而作二立僧伽藍三僧已散能和四修四無量五代父母佛命六自出家教人出家七建立法幢若人於上七業中隨作一業得生梵天是知生其初禪梵天由此七業而受梵福況其王乎故樂福者得不勉力而修又其梵福之量俱舍又云用諸衆生惡業感一三千大千世界業為一梵福之量則又勝智論校量六天之量且一梵天福量之尚爾況梵王乎是宜興供以崇佛會矣讚曰我佛天上下生時大梵天王前引之手執白拂或居右宮殿奉獻吉祥師請轉法輪真世主大千萬億統邊夷十八梵中遵號令故應上下總依歸身量修長六千里一劫半壽數希奇色若白銀頂有髻別名尸棄破邪思欲界六天難並福禁戒明淨具威儀護法護國護修行別召衆典每高推雖則計為衆生父天宮佛土動相隨欲生其中七種福造立佛寺建支提和合衆生代父命法幢高樹度群機自他出家超欲海喜捨無量廣慈悲聞茲聖力難思議首當崇奉仰靈儀帝釋天王傳帝釋華梵互舉而語略也梵云釋迦因陀羅或云釋提桓因此云能天帝或云能天主俱舍具梵語乃云釋迦提婆因達羅今於梵語取釋字華言取帝字合而言之云帝釋也大般若等佛舉其名曰憍尸迦本有千名翻譯不備隨文別示耳其所居也在須彌山頂即欲界第二天梵語忉利此翻三十三由其因中曾與三十三人在摩竭國同修勝業置橋造井與園生善法赦支夫人同業共行又淨名疏昔迦葉滅後有一女人發心修塔仍有三十二人助之今乃同生忉利由此天四圍有三十二天宮其中間帝釋居之故云三十三以帝釋因中為首故報為天王并有園生善法赦支三夫人其宮之東北有園生樹西南有善法堂帝釋每升其堂集天衆説法若帝釋不在其堂諸天凡到必恭敬其座其身量一里具三十二相而諸天不具其壽限則人間一百年為彼一日一夜三十日為月十二月為年以人間三萬六千年為一歲如是壽滿十歲手執金剛寶杵表至貴而却敵故大論云帝釋有之薄福者難見又涅槃云帝釋金剛寶杵能滅阿修羅淨土三昧經云天帝釋鎮臣三十二人四鎮大王司命司録於諸齋日下界審行禍福除死定生注記文籍若爾則橫於忉利統三十三天竪則四王已下無不總之光明文句云帝釋共八十億那由他天女縱逸嬉戲看東忘西欲猶不足化為老修羅納舍支使諸天忘身失首華嚴云有大象能化身與諸天娛樂十地經云第三地菩薩多作忉利天王天台云阿含中帝釋是阿那含若別圓教中帝釋位住楞嚴三昧未來成佛號曰無著西域記佛下忉利天時作七寶金階在佛左邊執七寶蓋侍佛而下同與梵王請佛説法佛於其宮中纍説衆經在佛因中纍為化人或化師子鷹鴿以試其心與阿修羅戰奔車而走遇金翔鳥巢見卵欲生令御者回車不肯傷之至于誘人行施種種示現其事非一要集云帝釋為大迦葉從貧行乞乃化為貧夫婦織席為生施食與迦葉求其福而無厭至于五衰相現墮身驢胎聞人三歸善心再生還為帝釋而受天福別譯阿含云有一夜叉其形甚小顏色黑惡坐天帝座三十三天皆大瞋忿天帝釋言此名助瞋鬼也即偏袒右肩手擎香爐語夜叉言大仙我是天帝釋三自稱名夜叉身形轉小於是銷滅是知雖處忉利之尊而慈不傷物求福不厭五衰縱現三歸還生洎乎欲境非常身壽殊報來崇佛會請轉法輪弘讚真乘統攝諸趣司察善惡注籍死生慈以折伏助瞋夜叉勤以來試修行菩薩則設像崇敬必致禎祥讚曰成佛忉利下降時帝釋天王從靈儀化現金階三道布左邊寶蓋手執持此天住在須彌頂三十三人福共為修橋造井摩竭國更兼佛塔建支提昔因今感非常報乃為天主化邊維升善法堂時教誡無邊天衆總歸依三十二相如華璨身長一里實希奇人世百年為日夜彼壽千歲是年期五欲之樂時不足化作修羅納舍支曾墮驢胎興善念暫逢瞋鬼反生慈昔與梵王同請佛纍於其處闡慈悲每現化人行化事常司善惡運無私大哉世主堪崇奉庶希降鑒賜純禧四天王總傳起世經云須彌山半四萬二千由旬有四天王天所居宮殿此即六欲界之初天也楞嚴云諸世間人不求常住未能捨諸妻妾恩愛於邪淫中心不流逸澄瑩生明命終之後鄰於日月如是一類名四天王天增一阿含經云須彌山半有四種天在彼居止初生乃自然化現在天膝上自然寶器盛天百味食已長大與餘天等入池浴訖詣香樹下香樹曲躬取香塗身復詣吉具衣樹取種種衣著復詣莊嚴樹鬘樹器樹果樹樂樹隨意受用視東忘西視西忘東無量快樂身長半里衣重半兩壽以人間五十年為一晝夜三十日為一月十二月為一年以人間一萬八千年為一歲如是滿五百歲俱舍云住欲界初天依妙高山四面第四層級去地萬踰繕那四面背山日月星辰皆是所部封邑其王有四光明經內毗沙門天王主北方也提頭賴吒天王主東方也毗留勒叉天王主南方也毗留博叉天王主西方也佛言過去已曾供養恭敬尊重讚歎無量百千萬億諸佛於諸佛所種諸善根説於正法修行正法以法治世為人天王若有人王能供養恭敬金光明經及説法者隨是經典所流布處而作擁護令無留難亦護國王及其人民除其患難悉令安穩他方怨賊立使退散乃至日月星宿不失常度風雨隨時無諸災殃人民豐實自足於財心無貪吝亦無嫉妬等行十善其人壽終多生天上又云我等四王二十八部諸鬼神等及無量百千鬼神以淨天眼常觀擁護此閻浮提是故我等名護世王佛與四王對揚文廣略舉一二矣毗婆沙論云佛初下生四天王以天繒接太子身置寶几逾城之時四天王捧馬四足本行經云佛初成道欲受食故四天王各獻其鉢佛總受之按令成一四楞如舊西域記有寺多寶物收藏以修其寺宇塑四天王以護之有突厥王貪其寶故率衆來取夢見天王以戟刺心其心大痛至明而卒于闐國王無子求於天王志誠無怠感於自額裂而生一子地生其乳王收養之高僧傳杯度持一葦圌至其齋家當路而放主人嫌之數人舉之不動乃見四小兒在內問之答曰四天王也食畢杯度自舉而去其輕如毛分陀利經海濟婆羅門欲供養佛時四天王令諸藥叉取旃檀為薪及諸上味助營七日之供洎乎諸經弘護其文非一然四王所統或云各統八部或云各主二部四天王經云有三十二輔臣靈威要略云四王共有三十二將孔經中四王各領二十八將金光明經乃云我等四王各各自有五百鬼神又云及諸眷屬有無量百千鬼神擁護四方令無災禍是知鬼神部類開合有殊皆四王所統於四方崇善之所悉來守護令其安穩暴惡之所悉皆遠離由遠離故致興災害其於賞善罰惡護國利民可謂至矣力觀其意專在護法欲説聽流布蓋由居民若不安正教難敷闡自非大權安能若示至乎獻如來鉢於成道之後持杯度圌於齋主之家敗突厥之貪生于闐之子助營佛供持護法門則四王之功可謂大矣故晉唐已來立像崇奉良可尚也讚曰我佛成道受食時四王取鉢爭獻持是時一鉢化為四各各將奉釋迦師我佛手按還成一令其所願各無違此天住在須彌半第四層中分四圍生者化形來膝上自然香樹及泉池身相修長各半里輕鮮半兩以為衣人世百年為兩日積之五百壽希奇日月星辰皆所統四方護世闡靈威二十八部皆統領咸令降福免災危可使國民常富樂流通正法布祥禧突厥懷貪心忽痛于闐無嗣額生兒高僧圌內形雖小海濟家中供倍滋爰自晉唐咸俯仰每彰靈應赴虔祈此分此四天王壽量身品及靈迹護法之功不可分故先總録之今乃各列其事而為別傳北方天王傳梵語毗沙門此翻多聞福德之名聞四方故陀羅尼集云父名羅婆陀又云婆難陀母名密闍盧又云蘇富四明云西土以北方為上由彼居多面東以北為左故光明中首以毗沙門天王為列也其所居乃須彌山半之第四層之北也智論云北方天王護北單越亦兼餘洲四埵之中乃水精埵俱舍論云黃金埵增一阿含云金銀城中間毗沙門天王將諸閲叉衆孔經云北方有大天王名曰多聞是藥叉主以無量百千藥叉而為眷屬守護北方彼有子孫兄弟將軍大臣雜使阿毗曇云頻婆羅王死為北方天王長子名曰祇那利沙護持佛法安慰衆生陀羅尼集令作北方天王像法其身量一肘著種種天衣嚴飾極令精妙與身相稱左手伸臂執矟拄地右手屈肘擎於佛塔矟音朔矛屬長一丈八尺唐立像儀令身被金甲而足踏女人之肩下作雲以擁之或云乃其母也其手中執捉與前亦同於其左右羅列八部風水雷電諸鬼圍繞其子祇那利沙并九十一子前後隨從由唐天寶中西番大石康居三國兵圍西涼府詔不空三藏誦仁王密語玄宗乃見神人五百員在乎殿庭帝問不空不空曰毗沙門天王子領兵救安西請急設食發遣四月二十日果奏二月十二日城東北三十里雲霧間見神兵長偉鼓角喧鳴山地崩震番部驚潰彼營疊中有鼠金色咬弓弩弦皆絶北門樓有光明天王怒視番師大奔帝覽表勑諸道城樓置天王像此其始也大論中北方領二部一名夜叉此云輕健二名羅剎此云可畏若餘經中開合總別或異皆屬所統故也又唐懿宗咸通三年西川及四州現僧相天王皆有記録賢愚經云有優婆夷誦經毗沙門天王從空而過乃曰姊妹我與汝寶物可請舍利弗齋當得勝福洎其餘感通難以盡紀然多聞天王師鬼神而統八部護世界而保國民可謂顯矣而國朝因唐制凡立城寨必先立像事固宜然至乎金鼠絶番部之弦與寶增女人之福凡所祈響應猶形聲豈特西涼川蜀者乎讚曰北方天王號多聞護世元首鬼神尊須彌四層金埵住夜叉羅剎統其倫祇那利沙為的嗣無量兄弟及兒孫設像儀令長一肘天衣種種稱其身左手持矟令拄地右擎佛塔敬能仁曾向李唐垂化迹西涼脫難現威神金鼠嚙弓弦盡絶山崩地吼震風霆城頭怒目番戎懼群兵潰散靜煙塵詔下國民皆立像至今城寨尚依遵或現僧形護西蜀或復乘空教女人儻能恪志崇靈化定應降鑒賜殊勳東方天王傳梵語提頭賴吒此云持國即護持國土也陀羅尼集云父名難陀母名蜜闍盧其所居也即須彌山半第四層之東埵也智論云東方天王護東弗喻逮亦兼餘洲住黃金埵俱舍云住白金埵又云諸琉璃城中間提頭賴吒天王將諸乾沓和衆智論明此天王領二部一名乾闥婆此翻尋香行即天帝釋樂神也二名富單那此翻臭鬼或云主熱病鬼孔經云東方有大天王名曰持國是彥達縛主以無量百千彥達縛而為眷屬守護東方彼有子孫兄弟軍將大臣雜使陀羅尼集云此左手伸臂垂下把刀右手屈臂向前仰手掌中著寶珠珠上出光賞善罰惡彰此神用持世護國四王同功而此特名持國則持世得非如經所謂如諸國王所有土境是持經者若至其國是王應當往是人所聽受如是微妙經典聞已歡喜復當護念恭敬是人我等四王復當勤心擁護是王及國人民為除衰患令得安穩則覽總成別以立其名良由護法以護國者乎讚曰東方天王號持國居白金埵護東洲琉璃城中立宮殿無邊欲樂恣嬉遊天像巍峩全甲胄威楞剛毅出常流左臂舒下刀在手右手持珠光𦦨浮統領鬼神數無量略言二部類應周彥達縛乃尋香者每隨天帝樂神收富單那即名臭鬼時行熱病使人憂天王禁禦令調伏庶令國界得安休賞善罰惡難思力是宜衆彚總歸投南方天王傳梵語毗留勒叉此翻增長令自他威德增長也亦令自他善根增長陀羅尼集云父字和修吉母名慪惙帝其所居也即須彌山半第四層南埵智論云毗留勒叉天王護南善部洲亦兼餘洲住琉璃埵梵語吠琉璃此云不遠山寶復古編云字當作流離不當從玉以此寶出須彌山不遠故也增一阿含經云水精城琉璃城中間毗留勒叉天王將諸魔鬼孔經云南方有大天王名曰增長是矩畔拿主以無量百千矩畔拿而為眷屬守護南方彼有子孫兄弟軍將大臣雜使智論明此天領二部鬼衆一名鳩槃荼此云甕形由似冬瓜是魘魅鬼也二名薜荔多此云祖父乃餓鬼中之劣者毗沙門天王經云南方有鳩槃荼王名尾嚕吒迦此乃與孔經舉其一也陀羅尼集云此天王左手亦伸臂垂下把刀右手持矟矟根著地是知由折伏邪惡方能增長善根雖四王同功而今以總從別故目其號如經所謂增長身力心進勇鋭增益諸天此則增長善根也又云是諸人王應得擁護乃至護宅之神增長威德此則增長威德也通自他益經有其文然此南洲正屬此天王所護欲善根威德增長而無增長惡趣增長惡伴自他之患得不荷其呵護之賜乎讚曰南方天王號增長居琉璃埵護南洲水精城中立宮殿無邊欲樂恣嬉遊天像威嚴施甲胄右手持矟拄其矛左手把刀却垂下摧邪輔正護真流百千眷屬子孫等略言二部統應周鳩槃荼乃甕形鬼所謂魘魅在閻浮薜荔多名祖父鬼鬼中劣者是其儔天王統攝遮其惡不令侵惱起群憂雖則四王功不異總中彰別有因由增長善根心勇鋭增長威德每同休況我此方真世主素蒙呵護免愆尤西方天王傳梵語毗留博叉亦云尾嚕叉此云雜語以能作種種語故又翻惡眼又非好報孔翻云廣目陀羅尼集云父名婆伽羅母名澀秀卑其所居也即須彌山半第四層之西白銀埵阿含金城水精城中間毗留波叉天王將諸龍神智論云毗留博叉天王護西洲亦兼餘洲領二部鬼衆一名毗舍闍此云噉人精氣令人四百四病遇苦發心亦噉五穀精氣令國飢饉二名毒龍護世經説龍有四毒謂視毒噓毒氣毒觸毒遇此毒者隨一皆死孔經云西方有大天王名曰廣目是大龍王以無量百千諸龍而為眷屬守護西方彼有子孫兄弟將軍大臣雜使陀羅尼集云此天王左手同前執矟少異右手中把赤索亦由折伏方能生善然名廣目惡眼者口怒目張威使邪惡潰散如西涼府城北門樓天王怒視番師大奔兵衆驚潰也又其雜語亦以種種語言折伏邪辨也故經云以淨天眼過於人眼常觀擁護此閻浮提若此國土有諸衰耗怨賊侵境飢饉疾疫乃至悉皆滅盡此其廣目之義也又云能説正法修行正法為世法王以法治世又云能以正法摧伏諸惡能壞三千大千世界外道邪論摧伏諸魔怨賊異形此皆種種語言折伏邪義也然滅惡生善四王同功今亦以總彰別總顯其名而弘護真乘加被説聽法力聖力共摧煩惱之魔怨惡眼天眼咸鑑流通之邪正讚曰西方天王名廣目居白銀埵護西洲水精城中立宮殿無邊欲樂恣嬉遊天像左手持矛矟右把赤索御邪流眷屬百千及軍將略言二部類應周毗舍闍鬼噉精氣生人癡病省愆尤亦虗五穀作飢饉國民為害起災憂諸惡毒龍無量數亦隨統攝護田疇能以語言挫邪辨時張怒目散兵酋滅惡四王功豈異總中彰別有因由天眼洞視除衰耗正法治世護薰修光及四方皆保衛故當虔恪用歸投金剛密迹傳梵語跋折那或云跋闍羅此云金剛又梵語那羅延此翻金剛手由羅延翻手或翻執而略跋折二字只云那羅延也由此力士手中執金剛寶杵故從所執以立名楞嚴中本名烏芻瑟摩此云火頭經云我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔怨寶積經云法意太子願作力士立名密迹常親近佛在外威儀省知如來一切密迹祕要之事信樂不疑其始因也集要引佛名經及上生經説昔有一王生千單二子千兄同詣佛所發心修道而二弟不知一弟發願若千兄成道我佛佛所為魔惱害一弟發願我佛佛所為力士護千兄教法故賢劫千佛中皆其護法也其居處也孔經云大聖金剛手住居王舍城常在鷲峰山以為依止處其同類及顯現者俱舍頌云妙高頂八萬三十三天居四角有四峯金剛手所住世尊云山頂四角各有一峯其量高廣各有五百藥叉神名金剛手於中止住光明云金剛密迹大鬼神王及其眷屬五百徒黨一切皆是大菩薩等什師譯孔經列五百各有金剛密迹力士圓覺經火頭摧碎八萬金剛楞嚴經中十恆河沙金剛密迹如是之類衆經非一今之所奉即密迹力士火頭金剛也其像也露袒其身怒目開口遍體赤色頭上有髻手中執杵以跣雙足威楞勇倢長阿含云外道阿摩晝問佛四姓佛云汝姓是釋迦奴種彼不肯信故不答佛云汝宜速答密迹力士手執金剛鈴杵在吾左右當破汝頭分為七分時力士即現空中彼方信伏又秦始皇時天竺室利房等沙門一十八人來至長安始皇囚於獄中金剛力士破獄垣以出之江西有一寺乃金剛打供寸土不居於寺界之外皆二聖力士一切所須令施者送至建炎初金人犯順既至其寺不信靈感以鐵索拽之忽力士發聲兵衆皆倒至今尚在其靈應之事不唯紀之於文亦往來者皆能言之夫本華實芽母鳴子應其猶鏡像谷聲則大願力護善遮惡信不評矣然賢劫千佛之二弟一為調達以魔惱一為力士以護持則法華以提婆達多善知識故得成正覺授記號天王如來上生經中婁至佛願作力士護千兄教得非逆順皆其助乎是故形氣相求各因其類故楞嚴云是故鬼神及諸天魔魍魎妖精於三昧時僉來惱汝然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅氷暖氣漸鄰不日銷殞徒恃威神但為其客成就破亂由汝心中五陰主人主人若迷客得其便當處禪那覺悟無惑則彼魔事無奈汝何是知邪念若生魔必得便正心若發力士潛護故佛一呼空中頓現室利枉囚破垣脫厄得非是與故修行者能持正法則大士必執金剛之杵而左右之所謂能以正法摧滅諸惡者也讚曰密迹力士執金剛群魔來惱悉能防烏芻瑟摩初發願三昧圓成號火光法意昔因曾立誓千兄賢劫護行藏一一盡皆成正覺教法遐宣遍一方最後成佛名婁至即是密迹證法王見住鷲峯或天上或云五百守天堂或云八萬皆名異十恆河沙數莫量其身赤色頭有髻手持寶杵力難當現身曾折阿摩晝破獄因救室利房由慈誓願弘持故至今佛宇息它殃自此仰祈呵護力永銷魔罥法門昌摩醯首天傳梵語摩醯首羅此翻大自在或翻威靈帝或云三目智論立三界主即摩醯首羅為三界尊極之主華嚴經亦稱三界主其居處也在色界頂樓炭經云阿迦尼吒即首羅所居有頂天也華嚴疏引智論云過五淨居有十住菩薩住處亦名淨居號大自在天王輔行記云色界頂夫三目八臂騎白牛報白拂有大威力能傾䨱世界舉世以尊之妙樂云色究竟天壽萬六千劫身長一萬六千踰繕那華嚴經云能知大千雨滴之數是十地菩薩入大乘論等説魔醯首羅天上有一實報土成佛以大千世界為所統境然經中別有摩醯首羅乃藥叉神非此天主如孔經云摩醯首藥叉止羅多國住既云藥叉止住羅多國定非色頂天主也光明經鬼神品內先云大自在天即此天主次云大力鬼王那羅延等摩醯首羅即藥叉者所以舊傳以列位卑下為疑也又本行經説太子以西國之法令禮天神名曰摩醯首羅其神極惡而復有靈太子至其神所神自離座下階先禮太子是既知云極惡必非天主耳所以古人嘗議摩醯首羅有二神而不決者以名同故也蓋摩醯首羅此云三目由二神皆有三目名故相濫今古畫像作兩種不同一作菩薩相但三目八臂執拂持鈴杵并尺結印合掌一作藥叉之形赤髮髼起三目八臂執弓箭等至今二像不同今既曰大自在及威靈帝定非藥叉矣然楞嚴又云窮諸行空已滅生滅而於寂滅精妙未圓若於所歸覽為自體盡虗空界十二類內所有衆生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶迷佛菩提忘失知見若爾則雖無覺觀號令下界而其執情未除也又云背涅槃城生大慢天所謂尊極三界慢心不忘未免念動則傾覆世界耳既居十地統攝大千雖無號令而有形色中此天獨尊故當崇敬以仰威靈儻指為三目藥叉則其陋矣讚曰摩醯首羅尊極主居于色頂自在天總攝三界為所統一一雨滴知大千三目八臂執白拂乘騎白牛化無邊能覆世界傾天地舉世尊崇仰大權萬六千劫乃其壽身量高勝難比肩十地菩薩之報處威靈超出無與先但執慢心迷正見計十二類為生緣別有藥叉亦三目住羅多國名濫傳昔年太子曾往謁西域欽奉類真仙既非色頂尊崇主品位難齊地上賢故今明示知終始庶希降鑒赴几筵散脂大將傳梵語散脂修摩或云散脂迦此云密陀羅尼集云鬼子母有三男長名唯奢叉次名散脂大將小名摩尼跋陀則知其父乃德叉迦也不空譯孔經云復有二十八藥叉大將能於十方世界覆護一切衆生為除衰惱患厄之事有藥叉大將住於東方擁護東方乃至南西北并各住四圍常居於地常在空居蓋每方及上下共二十四而四圍各一則共成二十八部智者云散脂乃北方天王大將餘三方則東方名樂欲南方名檀帝西方善現各有五百眷屬管領二十八部光明經鬼神品云二十八部諸鬼神等散脂為首百千鬼神散脂品云隨是經典所流布處我當與此二十八部大鬼神等往至彼所隱蔽其形隨逐擁護是説法者銷滅諸惡令得安穩又對佛前自説名義云何因緣故我名散脂鬼神大將唯然世尊自當證知世尊我知一切法一切緣法了一切法知法分齊如法安住一切法如性於一切法含受一切法世尊我現見不可思議智光不可思議智炬不可思議智行不可思議智聚不可思議智境世尊我於諸法正解正觀得正分別正解於緣正能覺了智者以三五十五句圓義釋之此乃法門解也仍以三密加被説者經云令説法者莊嚴言辭辨不斷絶此口密加被也衆味精氣從毛孔入等此身密加被也心進勇鋭等意密加被也乃至令其聞者智聚功德聚受人天樂未來疾得菩提是知內證外應微妙難思而以弘應為任福智所聚終至佛果仍以辨才加被説者則為二十八部之司總其於賞善罰惡功亦大矣儻在流布正法得不加被讚曰二十八部鬼神中散脂大將最威雄乃鬼子母之次子北方元首實靈聰無量藥叉皆所統護持正法使流通隱蔽其形常守衛或居城邑或王宮自説立名之本意一切法義總含容正解正觀正分別正緣覺了義圓融密加説者以詞辨精氣皆入使身充心進勇鋭意加被自然和悅保安沖仍令聞者智慧聚菩提疾證表深功大哉圓密難思議賞善罰惡利何窮儻在聞持并演説是宜崇敬展精衷
