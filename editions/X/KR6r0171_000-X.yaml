body:
  text: 諸天傳序迦文降世宿同願行者隱實施權示為天神慈威折接保衛國民輔翼至教以福資慧助於說聽然其列位當就迹論天台百錄依光明鬼神品列之詳矣自慈雲製懺供天之設時有移易北禪首非之而紛紜之論逮今未已鄣南師因欲刊正而集天傳尚或循舊人亦病諸紹興間偶主烏戍墖院鏡庵霆老出住寶閣具元復在焉考槃雙槐蓮社晦菴一時諸方士以道義相忘每以禪教詩文雅會激揚甞論天位考槃有言兩剎每供天會既排列失序二公之辯正使無謬誤可也後既退間分散南北今十有五年餘但於文藁間辯辯時見于舊軸回思昔會真成落謝塵耳既出空相來謁鏡庵乃見重編天傳已成詳以閱之豈止於舊傳筆削潤色而已且補入經論天文辯證前失仍立兩端明排列之次及各為讚詞可謂始末大備矣則如斯文草創於鄣南功成於鏡庵使今古凝滯泮然冰釋誠有補於流通且喜不負考槃之囑輒因勸請刊行博利見聞敢書卷首以告雲來乾道癸巳一陽前十日傳天台教觀釋奉規序
