body:
  text: 大辯天傳大辯天乃略名也光明經云是說法者我當益其樂說辯才令其所說莊嚴次第善得大智若散脂品中乃云不可思量智慧功德成就大辯天經又云廣宣流布乃至得聞是經當令是等悉得猛利不可思議大智慧聚不可稱量福德之報廣略之名其義可見然最勝王經詳言其迹云或在山嵒深險處或在坎窟及河道或在大樹諸叢林現為閻浮之長姊身著青色埜蚕衣在處常翹於一足常以八臂自莊嚴各持弓箭刀矟斧長杵鐵輪并羂索帝釋諸天常供養皆共讚歎盡歸依師子虎狼恒圍繞牛羊鷄等亦相依於一切時常護世亦護一切眾生者所言辯者略有四種一者法無礙辯百千名字分別不錯即經云善解無量種種方便二者詞無礙辯法流灌注而無壅滯即經云善能辯暢一切諸論三者義無礙辯諸法究竟會行證真即經云善知世間種種技術能出生死得不退轉必定疾得阿耨多羅三藐三菩提四者樂說無礙辯接物利生流通不倦即經云我當益其樂說辯才乃至令不斷絕夫超出三界疾至菩提以慧為先故光明列品及鬼神品中皆以大辯在功德天之前此論正助為次也散脂品中先功德而後大辯者以福慧為次意謂由福以資慧故大辯品中云能出生死疾得菩提功德品中以常在天上人中受樂值遇諸佛速成菩提散脂品中以人天之中常受快樂於未來世值遇諸佛疾成菩提是知正助則以慧為正以福為助出生死故超三界故福若無慧非波羅蜜故也若以在人天中必乃先福後慧盖未出三界以修福故且離三塗而生在人天然後以福資慧可至菩提所以功德品云三惡道苦悉畢無餘散脂品中三惡趣分永滅無餘古師謂只欲求福助於說聽良有以也今之人推求福之心但欲富樂而莫存說聽之懷良可鄙也志於學者得不仰大辯才能與總持令不忘失者乎讚曰大辯才天智慧主於說法人無總持令其句義無忘失文字次第使無違以大威神資四辯法義樂說及言詞此天所住依岩谷深險坎窟最幽奇泉澗叢林孤絕處身著青色埜蚕衣現為閻浮之長姊一足常翹一足垂八臂自在莊嚴具弓矟箭斧手持之寶杵鐵輪并羂索帝釋天眾共歸依師子虎狼牛羊等並來前後每相隨護諸眾生弘正法護世令安一切時有人若欲超三界當知智辯力難思功德天傳梵語室利摩訶提毗耶此云吉祥大天涅槃及陀羅尼集名功德天皆其略也光明散脂品中乃其云第一威德成就眾事大功德天舊傳釋云第一威德言其體德也成就眾事言其功用也其本因則經云我已於過去寶華功德海琉璃金山照明如來所種諸善根其現益則經云是故我今隨念所視所至方能令眾生受諸快樂若衣服飲食資生之具七寶等悉無所乏陀羅尼集云鬼子母夫名德叉迦女名功德天有妹名黑暗女其居止也光明云於此北方毗沙門天王有城名曰阿尼曼陀其城有園名功德華光於是園中有最勝園名曰金幢七寶極妙此即是我常止住處其天相也陀羅尼集云其身端正赤白二臂𦘕作種種纓珞鐶釧耳璫天衣寶冠天女左手持如意珠右手施無畏於寶臺上坐左邊𦘕梵摩天手執寶鏡右邊𦘕帝釋天女散花供養天女背後𦘕七寶山於天像上作五色雲雲上安六牙白象鼻絞瑪瑙缾缾中傾出種種物灌於功德天頂上天神背後𦘕百寶花林頭上𦘕作千葉寶盖盖上諸天妓樂散花供養其像底下右邊𦘕作呪師形著鮮白衣手把香爐胡跪供養良由此天昔種善根之故所感福報如是能令眾生成就眾福護持一切令足所須亦與大辯四王等擁護四方令無灾禍又令稱金光明經為我供養諸佛世尊三稱我名燒香供養別以香華種種美味供施於我灑散諸方即能聚集資財寶物我時慈念多與資生若供施時令誦其呪讀誦通利七日七夜受持八戒供十方佛為自及他回向具足阿耨多羅智論云昔有人十二年事於大天遂感天人賜與德缾缾中出生一切珍寶此人忽起憍慢以双足踏於缾上其缾遂破寶物皆無古師嘗謂凡求福者助於說聽所以經云是說法者我當隨其所須之物及餘資產供給無乏令心安住晝夜勸樂正念思惟是經章句分別深義廣宣流布令不斷絕是諸眾生聽是經已於未來世常在人天值遇諸佛速成菩提四明云若為自身受五欲樂希望財寶即輪回業眾聖所呵尊天寧護是知若世間福雖感德缾終須破散以福資慧成出世因財果滿二嚴依正殊報凡興供者無時於斯讚曰有天女號大吉祥成就眾事最為長寶華佛時種善本感應能隨所念方常在北天為止住阿尼城園號華光更有勝園金幢處七寶極妙數難量天身鮮白相端正坐在金臺高勝床纓絡花冠及鐶釧種種天衣及耳璫左手持珠右無畏梵天執鏡侍其傍背於寶山雲五色花林百卉盡芬芳白象鼻絞瑪瑙器缾中傾寶數無央灌其天頂莊嚴聚呪師跪伏兒端莊若或稱名而供養別敷好座具花香一切資生皆具足無論財寶及牛羊所求成就難思事意令法會善敷揚韋天將軍傳靈威要略曰天神姓韋諱琨南方天王八將之一臣也四王合三十二將而為其首生知聦慧早離塵欲清淨梵行修童真業面受佛囑外護在懷用統三洲住持為最亡我亡瑕殷憂於四部達物達化大濟於五乘光明鬼神品中有韋䭾天神梵語韋䭾此云智論今此則以韋為姓雖類華夏一經之裔而其天神隱顯其號烏可惻量唐高宗乾封歲京師淨業寺道宣律師因覩韋天嘗問律相等事律師述靈威要略并律相感通二傳備載其實如要略中天神姓費自述云弟子迦葉佛時生在初天在韋將軍下諸天貪欲如醉弟子以宿願力不受天欲清淨梵行徧敬毗尼韋將軍童真梵行不受天欲若有事至四王所王見皆起自唐高宗已來諸處伽藍及建立熏修皆設像崇敬彰護法之功其間感應錄於文集者甚多然童真乃十住中第八住而賢乎聖乎孰可知之讚曰四王三十二大將南方韋天以為先生知聰慧離塵欲清淨梵行威儀全修童真業持禁戒迦葉佛時志已堅四部殷憂常守衛三洲護法應機緣名姓隨凡安可惻示迹唐朝遇道宣備言佛教深幽事律相靈威二集傳或見四王王起接是知無染所當然爰自乾封崇至化逮今名位列諸天每在伽藍或蘭若熏修之所現威權頭頂金兜橫寶杵合十指掌兒童年或警行人令進行或隨方所護其邊却除外障令無惱庶幾佛日照三千堅牢地神傳地神乃總號安住不動皆地神故堅牢乃別名揀非他故光明中品名與標人左右其語今依品名也集要引嘉祥云堅牢者理體不可壞也如金剛王無能破者地者依持出生乃智用也造化不測故稱為神智者亦云已上諸天或住善權方便道為眾生法父住善實智度母為眾生母譬如陰陽覆載萬物智度養育出生眾善無改變曰堅牢常也能荷樂也能生淨也名之為他德自在戒也稱之為神此舊傳引四德以釋其名也觀佛三昧經有王問佛汝之功德誰為證明佛即垂無畏手指地一切大地六種震動堅牢地神涌出唱言我是證明金光明中隨是經典所流布處是地分中敷師子座令說法者廣演宣說我當在中常作宿衛隱蔽其身於法座下頂戴其足此其護法敬人也我聞法已服甘露味增益身力等此其聞法得益也而此大地深十六萬八千由旬悉得眾味增長具足豐壤肥濃過於今日此其舉體依持也藥草華果美色香味皆悉具足眾生食已增長壽命色力辯安乃至隨其所樂此其出生利物也得是威德乃至聽受是經此其令他獲益也各應相慶乃至常生天上人中受樂此其遇佛遠惡也若說一喻一句及稱首題令其受樂深信三寶疾至菩提此其不退正信也此土並略所述之文以題其行其像也集要令作天女之相花卉林木一時𥪰秀地天合掌無量諸仙採時花果前後圍遶轉法輪經云有諸地天知波羅柰欲轉法輪為佛置大圓轉殿種種莊嚴縱橫七千由旬虗空諸天以寶盖嚴飾地藏經佛告堅牢地神汝大神力諸神少及何以故閻浮土地悉蒙汝護乃至草木沙石稻麻竹葦穀米寶具從地而有皆因汝力然流布經處於說法人以頂其足於其花果出生滋益世出世法皆受其賜而功亦大矣讚曰住善實智以為母荷負萬物使依持體性堅牢不可壞備彰神用以名之果實花卉因其力出生地味倍豐肥始自如來成道處便為作證現希奇初轉法輪置宮殿莊嚴異寶及琉璃洎向光明宣妙旨欲言宿衛每相隨於說法人頂双足由服甘露色充滋一切事業令成辦身心適悅每安怡聽是經者長深信值遇諸佛成菩提天像莊嚴天女相執華果從盡周圍百卉芬芳於大地群木森秀茂繁枝萬物出生皆地力況於成實總其司又向法門垂勝力敢忘孚祐致虔祈菩提樹神傳梵語菩提此云道由此神守護如來成道之處菩提樹故以立其名光明中乃連別名云道場菩提樹神名等增益西域記曰其樹在摩竭國尼連河西南十里本行集經云菩薩將至道樹色界諸天先以天繒幡盖懸於樹上用為幖幟又慈恩傳玄弉至彼見其樹枯顇唯向東茂發一枝色甚青翠以表大教東流之像也西域記云樹本名畢鉢羅佛昔在世高數百尺累經殘伐猶高四五丈華嚴經中言菩提樹王即此處也其樹莖幹黃白枝葉青翠冬夏不凋每涅槃日葉皆凋落頃之復故此天女不唯守護此樹而乃彰益亦在佛因中為流水長者子時現半身讚隨名定實救十千魚故光明會中凡四品經佛獨與此天說于昔因而兼讚歎而讚佛中女天自云我常念佛樂見世尊常作誓願不離佛日乃至亦常修行最上大悲至乎世尊讚云善哉善哉快說是言是知大權示迹微妙難思舊傳約表云依實相理地一切種智而為根莖三十七品以為枝葉開萬行因花結四十二位之果四接覆陰於群生現神身而佐嘉會華嚴表法廣有其文諸經讚護亦非一二讚曰摩竭提國西南隅去尼連河十里餘有菩提樹甚高聳上有天神於此居既乃守護令堅固立名因此著經書此即如來成道處至今垂陰尚扶疎佛始將往於其下諸天繒盖預高舒樹神別名等增益曾告流水乃其初應當隨名以定實枯池速救十千魚故今天子蒙授記信知因行果應如金光明會對揚處經文四品委談諸常發誓願樂見佛觀一切性皆空虗我佛即從三昧起善哉快說以稱譽因果互嚴於佛化端知真是大權歟鬼子母天傳顯正論云鬼子母父名歡喜夫名圓滿具足藥叉姉名炙匿妹名摩尼鉢鬼子母生一千子在閻浮提最小者名愛奴偏所憐惜常食人子佛為化彼將愛奴鉢下藏之母於天上人間覓之不得佛遂化之令僧施食與之鬼子母經云有一千子皆為鬼王一王統數萬鬼眾五百在天上嬈諸天五百在世上嬈帝王人民或自稱林木神水神地神船車宅舍晝夜夢𥧌恐怖作恠佛為受五戒得須陀洹白佛言我欲止佛精舍旁呼千子凡天上人間無子息者我當與之姊名炙匿主人產妹名浮陀羅尼鉢主天上人間鬼四海船車治生財產陀羅尼集云鬼子母夫名德叉迦大兒名唯奢叉次兒名散脂大將小兒名摩尼䟦陀女名功德天寄歸傳云西方諸寺𦘕天母抱一兒於膝乃四天王之眾有疾病無兒膝者饗食薦之咸皆遂願其名號也或云訶利帝母光明中連稱訶利帝南鬼子母等及五百神百錄云訶利帝南鬼子母等五百眷屬今古多疑為二神故多不同今準孔經云散脂迦大將訶利帝母及五百子則知只一神也又訶利帝母真言法云𦘕作天女像金色身著天衣頭冠纓絡坐寶臺上垂下兩足於足兩邊𦘕二孩子傍其臺立於一膝上各坐一孩子又在懷中抱一孩子於右手中持吉祥果又其中自云我本藥叉女如來授我三歸依其𦘕像法與前寄歸傳文亦大同是知止是一天主人間男女而鬼主母由授歸戒故旁為呼千子同依佛宇不惱天人讚曰有呪曰唵弩弩莾哩迦呬帝娑婆訶訶利帝南鬼子母四王所統為藥叉父名歡喜居凡地夫乃圓滿德叉迦親生千子閻浮果半居人世半天魔女功德天吉祥者長男立字號唯奢妹名浮陀摩尼鉢主領財產及舡車小兒愛奴偏護惜或號之為尼䟦陀由茲鬼眾數無量食人男女日偏多我佛化之以方便取子琉璃鉢覆遮徧往四天無覔處却來佛所願回邪既授三歸持不殺令僧施食飽河沙旁招千子咸興善却依佛宇護禪那人有新產令無害求男女者裔其家此實一切鬼之母敢因法會薦香花摩利支天傳梵語摩利支或云大摩利支此翻陽炎由此天不可見不可捉火不能燒水不能漂如陽炎故也舊譯有摩利支天經一卷大宋新譯有大摩里支菩薩經七卷廣略雖不同而言此天神用不異新譯文云佛言有菩薩名摩里支恒行日月不能得見亦不能捉不能禁縛火不能燒水不能漂離諸怖畏無敢輕慢諸惡怨家皆不得便我昔知彼名號亦不能見其菩薩身相乃黃金色作童女相掛青天衣手執蓮華頂戴寶塔坐無憂樹下孔經云摩利支藥叉羅摩脚磋住金光明鬼神品云睒摩利子皆梵音楚夏也其經中新譯七卷之者廣出諸呪能令有情隱身於路或水火王難盜賊軍陣皆可隱身令不得便諸呪之中有六字最上心真言曰唵引摩引里支引娑縛二合賀此真言印二字合掌十指微曲如華開敷却二大指屈捻二中指如拳相結跏趺坐安印相於臍輪上下若求最勝上法而得用之若中下事不許用之速能成就別明成就法令行人想彼菩薩坐金色豬身上著白衣頂戴寶塔左手執無憂樹枝復有群猪圍繞作此觀已若速出道路如有賊等大難以手執自身衣服念心真言七徧加持衣角復結彼衣角冤賊等難不能侵害又有大摩里支降伏冤兵之法文廣不錄復有觀想法想菩薩身作忿怒有三面面有三目一作猪面利牙外出舌如閃電為大惡相身出炎𦦨偏袒青衣身黃金色種種莊嚴臂有其八右手持金剛杵金剛鈎左手持弓右無憂樹枝羂索頂戴寶塔立月輪內右足如舞蹈勢左足蹈冤家經中八臂執捉不同或云左手持弓索無憂樹枝及線右手執金剛杵箭其三面者正面作黃金色微笑左面黑色出舌顰眉作大醜惡相令人怕怖右面如同秋月圓滿清淨然此等皆有所謂而對治之耳此經七卷之文乃宋朝大宗皇帝時西天譯經三藏大息灾所譯印呪壇場文其周備大宗皇帝御製聖教序以冠其首故祈福之處參入天位然印本舊譯經後附入感應乃相州有人夜夢群猪繞一車車中盡是文字一鬼牽其車因問其鬼鬼曰此乃合殺戮兵戈之籍其人看之盡錄人之姓名遂問曰有名字如何得免鬼曰有大摩利支天經若能誦之并稱天名可得免也及覺遂請其經及日持聖號不數月果有兵危而得免之若爾則不思議力誠可依憑得不崇心以祈求安兵革者乎讚曰有天號曰摩利支行日月前誰見之水火兵難及恐怖一切冤魔難執持身相乃作黃金色顏如童子掛青衣頂戴寶塔或端坐手執無憂花樹枝或執蓮華或八臂前後圍繞乃群豬或執弓箭金剛杵鈎索等物示靈儀或復正面金光聚或如滿月或顰眉現以三面面三目種種威容各對治呪法觀想令成就冤魔銷散免灾危由我皇朝經再譯徧令佛宇建靈祠每有感通垂化迹持名誦呪伏慈威或添作二十位者更足成日月天子等四位日宮天子傳梵語須梨耶此云日說文曰日者實也太陽之精上騰為日中有金烏下有大龍輔之天文曰日者陽星之宗張衡志云日天之精也金精火珠所成能熱能照大威德經云亦名百光熾盛無上圓形普化令喜勝意不瞋無畏破暗約有百名若華嚴中日天子眾號無量今準法華云日宮寶光天子也十二遊經云成劫之時人食香稻黑暗便生西方阿彌陀佛令寶應聲吉祥二菩薩造其日月開人眼目異相云日月天子白佛言當作何業為日月天佛言由四緣故一常喜布施二修身持行三奉持戒法不犯威儀四然燈供佛次修十善不殺等行得生其中俱舍云日齊須彌山半去地五十一踰繕那阿含云日天子城郭縱橫五十一由旬樓炭經云日宮城郭方正二千四十里纓絡經云日宮殿七重相去各七由旬牆高十二由旬有其千門皆百寶所成異相云城方一百四十里高四十里光射人目見之若圓五風運持不令停住長阿含經云日天宮殿高十六由旬周帀欄楯行時百千諸天神導引也前之所說或有不同由城有內外見有小大故見差別樓炭經云日天壽量與四天王同右遶書云天輪左轉日月右旋其日乃自西南東北而行由日行遲而天輪速故帶而轉遂令人間謂日自東南西北而轉智度論云右遶者自東至南自南至西自西至北自北至東日月星辰圍遶須彌亦復如是因本經云日天宮殿繞須彌山半常行不息南閻浮提日正中時東弗婆提日則始沒西瞿耶尼日將出時北單越正當夜半六月北行漸移向北每日六俱盧舍六月南行亦漸移向南每日六俱盧舍一俱盧舍乃六里也在閻浮提最極南垂他形狹近日過速疾於冬分時晝短夜長六月過已漸向北行每一日中移六俱盧舍故在閻浮提洲處中而行北寬行久所以晝長夜短因本經云須彌山外有佉提羅伽山等山日天宮殿六月此傳言六月以六月陰六月陽如莊子六月息者也非謂定指季夏六月之中向北道行照觸彼山令生熟故又須彌山佉提羅伽山二山之間有須彌留海闊八萬四千由旬日天宮殿六月之中向南行時照觸彼海令寒冷故因本經云日天子身光照閻浮檀輦輦光照宮殿光明相接而有一千光明五百傍照五百下照其宮殿也以天金及頗梨合成起世經云有五種故障其光明而暗謂煙雲塵霧修羅手障楞嚴經云惡業眾生同分妄見遂見薄蝕金光明中由其國王專行暴惡不修善事故二日並現或日月薄蝕日月無光也漢天文志云日蝕君王當修德也夫日輪升天六合皆照則光明破暗洎成熟萬物功實大矣乃日天子之賜得不興供於法會焉讚曰日之炎體太陽精寶光天子禦宮城或號熾盛及勝意如是共有百種名由人成劫食香稻遂即能令黑暗生無量壽佛遣侍者菩薩名為寶應聲來造日輪破長夜遂得眼目開昏盲其城高廣千門啟一一無非七寶成由光照輦及宮殿兩處交接映光晶所以明曜射人目世間皆謂是圓形晝夜周行四洲上五風運持不暫停六月南行六月北遂令寒暑有相傾晝夜短長寬狹異或時薄蝕有虧盈大哉照世光明主願臨法會赴虔誠月宮天子傳梵語婆奴此翻光者又翻月也釋名云月者闕也太陰之精陰星之宗張衡云水之精也大威德經云金脂星主光者空主宿王等凡五百名華嚴中月天子無量今依法華云月宮明月天子成劫之時人食香稻黑暗便生吉祥菩薩造月輪以照夜其修因壽量並同日光天子也其去地也俱舍論云五十踰繕那阿含云月天子城郭縱廣五十由旬阿含云月宮城郭廣長一千九百六十里俱舍云玻胝迦寶為體水珠所助能照能冷周一百五十由旬立世阿毗曇云日月相去四萬八千八十由旬日行疾三由旬白月初日在前黑月初日在後纓絡經云以五風運持不令停住起世經云月圓闕者有三義故一背相轉由月天以天銀及琉璃合成宮殿背相而轉漸圓者白銀見故漸闕者琉璃面轉故二青衣天所覆光三日光影覆即日月相望及合璧而晦因本經云以何因緣月宮有影此大洲中閻浮提樹高大影現月輪以此有影蓮華經云此樹有雞王以棲其上彼鳴則天下雞皆鳴法苑中云婆羅痆斯國有三獸塔是如來修行時燒身之處劫初有狐兔猿相悅為友帝釋欲驗修菩薩行者乃化作一老夫安慰三獸乃曰今正飢乏何以饋食狐取鮮鯉猿採果實唯兔空迴兔令猿狐聚薪以火藏內遂俟火熾投身火中以身願充一餐老夫復帝釋身感其心故寄之月輪傳乎後世咸言月中之兔自斯而有漢紀云月行之道黑道二出黃道北赤道二出黃道南白道二出黃道東立春春分東從青道立秋秋分西從白道立冬冬至北從黑道立夏夏至南從赤道青赤出陽道白黑出陰道若夏月失節度而妄行出陽道則旱出陰道則水楞嚴經暈適背玦負耳虹蜺種種惡相淨覺解云此皆日月邊之惡氣也漢天文志云日月薄蝕怪雲變氣皆陰陽之精本在地而上應於天者也政失於此而變見於彼猶影之象形響之應聲又云月者刑也月食修刑是以說文凡禍福等字畫从示二乃古文上字也小者古文作巛即日月星辰三光也天欲令人悔過必於三光以垂象下示於人令其知過必改也是知月光陰滋萬物夜發光明功次於日光者焉讚曰太陰之精號明月天子居于白銀宮成劫時人食香稻黑暗便生皆昏蒙吉祥菩薩之所化月輪於是乘五風玻胝迦寶水珠體能照能冷成陰功去地五十繕那許修因壽量與日同右遶須彌常不息與日遲速咸住空圓闕由于城面轉青衣天覆及曈閻浮提樹光影現上有天雞鳴其中佛作兔時曾結友猿狐異類交情通帝釋試之觀大器各持所食共來供唯有兔時無物至自投入火以身充帝釋感彼希有事月中寄迹傳無窮萬物賴月滋永夜宜尊寶像啟修崇娑竭龍王傳大集等經中云娑竭羅大雲請雨經及光明經曰婆伽羅王須彌藏等經曰婆難陀孔經云娑薛羅乃梵音楚夏此云鹹海華嚴疏梵語三慕達囉此云龍王即大鹹海之中龍王也須彌藏經云善住龍王為一切象龍主婆難陀龍王為一切蛇龍主阿耨達龍王為一切馬龍主婆樓那龍王為一切魚龍主摩那蘇婆帝龍王為一切蝦蟇龍主又孔經列一百七十七龍王今娑竭羅當第七位居大海龍王之次大雲經列百七十餘龍王當第三位今所以獨供娑竭羅者一是蛇龍之主為龍本類故二是大權之中每對佛弘護故三佛之法寶在其宮故四自唐已來徧靈應故由集要云蛇龍乃其本類餘皆旁類也故知為五龍之主耳又如海龍王經法華華嚴大集偏稱此位故知大權弘護力勝又如龍樹入其宮見法堂無量法華中文殊師利所化八歲龍女即娑竭羅王之女大集亦云娑竭羅龍王有子名青蓮華面身相端正等處胎經云吾於海中與龍說法無數龍神龍子得道吾留金色全身舍利百三十枚令供養之故知佛之法寶在其宮中又帝心尊者北塔銘云唐大宗朝大旱諸處祈禱無感遂遣中使命順和尚祈雨順令中使往抱腹山草庵中有老僧著木履行道可云終南山杜順和尚伸意天久不雨願降甘澤使至果如其言即述前語老僧乃云大凡降雨須天符牒今雖無天符順和尚有旨則如天符牒無異汝可速回使回至都雨即隨至太宗遣使往謝順問老僧何人順乃云龍王也遂遣使抱腹山傳宣使至止見草木深林初無草庵遂賜順為帝心禪師焉大凡諸龍業報不一如薰聞記說龍有四種一守護天宮持令不落二興雲致雨三蛇龍決江開瀆四伏藏龍主輪王及福德人藏淨名疏云龍是畜生道正報似蛇依報七寶宮殿與天無異亦能變形為端正人通胎卵濕化四種生壽一中劫二十增減為一中劫壽盡為金翅之鳥所食僧護經云龍有五法不能隱身一者生時二者死時三者睡時四者瞋時五者交時迦葉詰難陀經云龍有三苦一者雖食百味飲入口即化為蝦蟇二婇女端正欲為夫歸二蛇相交三背道布鱗沙石生其中痛乃連心僧祇律云一日之中三過皮肉落熱沙薄身海龍王經云昔在人中作大福田受天福故神受自在不持齋戒受惡報身金翅鳥日食五百水龍一龍王能受八戒則免斯害具如菩薩處胎經說又若得袈裟一片一縷安於身上亦可得免僧祇律云往因布施今日奉養同天神力廣大龍宮飲食有能盡壽銷者有二十年銷者有七年銷者今娑竭羅龍王乃大權菩薩現此龍身故華嚴說位皆十地住不思議解脫欲降雨時三日之中先布密雲所降之雨不從口出不從身出端坐深宮舉念之時其雨普洽竪亘六天橫徧四域以時雨無所夭害位居十地迹示龍身護法護民其利博矣讚曰娑竭羅王主蛇龍弘護佛法使興隆大唐已來多感應故今法會仰深功有女八歲成正覺青蓮華子美儀容佛至其宮宣妙法金色舍利留其宮唐初昔年因亢旱曾蒙杜順指其蹤天使往見於僧相即時甘澤降靈空大抵群龍非一類胎卵濕化生非同正報乃蛇受天福金翅來吞而壽終三種苦相誠難受五不能隱事須從獨有大權垂化迹位居十地報難窮欲降雨時身不動先布密雲三日中舉念之間洽遐邇百穀咸秀使年豐如是利生無礙力願臨佛會賜靈通閻摩羅王傳梵語閻摩羅或閻摩杜羅或夜魔盧迦俱舍論云閻羅或云琰摩羅藥師經云琰摩乃經論互出不同或梵語之音楚夏此翻雙王亦云隻王由兄與妹皆作地獄之主故名雙兄治男事妹治女事故云隻新譯云靜息俱舍譯云息諍由此止息罪人諍故或以業鏡或示罪惡之處及與伴類令明了故顯揚論正法念經以鬼趣収瑜伽論開地獄趣収探玄記云依諸聖教說有五種一是地獄趣攝如瑜伽第二說二是鬼趣攝如瑜伽菩薩地說更有經文不錄三非二趣攝如華嚴經文別有閻羅王趣故四是變化如觀佛三昧經第五說及二十唯識等說五是菩薩作如瑜伽第七十七卷云炎魔名法王為利益為作損應言唯作益故知是菩薩也又正法念經中閻羅王為人說偈言汝得人身不修道如至寶山空手歸汝令自作還自受呌喚苦者欲何為言地獄者梵語捺落處此云苦噐圭山修證儀云順世間稱為牢獄今以地下有獄故稱地獄若正翻當云苦噐言盛貯苦人之器今義淨翻地獄也淨土三昧經云閻羅鬼王總治一百四十地獄正法念經云閻羅王在冥司三時自受其苦宮殿皆變炎熾鐵城所食鐵丸銅汁等以酬惡報也過已還舉善心復見宮殿百寶莊嚴以酬善因也阿含經云閻浮提南有金剛山山中有宮殿縱廣六十由旬地獄經云城廣三萬里金銀所成有十八小王淨土三昧經云有三十獄王十王經云閻羅於未來世作佛號曰普王如來集要云閻浮洲南二鐵圍山外有閻羅王宮殿縱廣六十由旬七重墻壁七重欄楯七重鈴網其外七重多羅行樹臺殿園苑種種可觀王以惡業自然而有赤鎔銅汁在前殿即變成鐵五欲功德皆沒王見此已怖畏不安即走入內時守獄者取王高舉撲之以鎔銅汁瀉置口中次第焦爛從下而出王作是念所住宮殿等由昔作惡悉皆隱沒今受此苦願捨是身於佛法中出家入道既發善念所住宮殿還復如舊便得快樂言其惡因者昔毗沙王與維陀始王共戰兵刀不如遂與十八大臣及百萬眾同發願言願我復生為地獄主治此罪人今日惡報願悉現前其壽限也俱舍說等活地獄與四天王天等其八大獄倍倍增之嗚呼善惡之報如影隨形端不虗矣而其苦樂端由一念故所以閻羅善念纔興苦相即滅其由明來暗去耳藥師又云一切眾生有俱生神隨其善惡悉皆記錄授與琰摩法王之使隨其善惡而處斷之又五天使者經云閻羅見罪人必切齒相責曾遣髮白目暗耳聾病瘦無力五使者相報云何不知則於警覺於人誠大權也所以瑜伽稱為唯益藥師名王之使十王記為普王如來良有以也此實冥府之主地獄之尊光明鬼神品特列其名既崇法會得不崇奉者乎讚曰閻摩杜羅乃雙王主於冥府事多彰兄妹分治男女獄或稱鬼趣或分張或說化現或菩薩隨其識境現難量十八小王三十眾咸參治事考條章見罪人至必呵責自作自受苦須當所治苦噐地下獄所居宮殿類天堂其城住在閻浮下七重行樹七重墻三時惡報王亦受鐵丸吞食飲銅漿善心忽發祈依佛出家入道向僧坊所居还復同天報再羅侍從顯靈光五天遣使令知覺信應警䇿念無常佛曾親授當來記普王遍證菩提場大權今日司幽陰但增利益濟無央既有恩光利存沒是宜法會略稱揚傳後續辯昔智者法師嘗曰男天女天所以不同盖彰慈威折攝然此論其相儀耳非定男女也如四王金剛韋天散脂娑竭閻摩之類乃男天也梵釋摩醯功德大辨地神樹神鬼子母摩利支日月天子皆女天也男天故威而折女天故慈而攝然此亦大槩之論且如大辨摩醯摩利支或現八臂手執利噐豈專慈也韋天作童男形豈專威也故在諸天慈威折攝無不具者就其勝而言之可也右辨慈威折攝摩醯首羅色頂天主亦三界主故云尊極梵王色界天主亦大千主故以有覺觀故統上冠下故云號令主帝釋地居天主亦三十三天主亦欲界主此即智論三天主也四王四方四界之主亦八部主又二十八部三十二將主金剛密迹護千佛教法主散脂二十八部主韋天三洲護法主地神百糓主樹神菩提場主鬼子母鬼王母主護男女主摩利支天救兵難主日月天子為晝夜光明主娑竭羅五龍主閻摩羅幽冥主此皆世間主也獨有功德天主世出世福德大辨才主世出世智慧乃二嚴主所以光明獨於散脂品中稱之意在此也百錄令特奉之亦為此也然若列梵釋等世主自當回護欲以臣佐而居帝王之上恐不可也右辨眾天所主或云諸天之本莫非大權故經云一切皆是大菩薩等而迹示天身然推其本則何獨天神所以常不輕禮一切眾唐飛錫念未來佛而百錄之中不許僧禮天者盖就迹之顯了故也談天之本迹者當須察此右辯天本迹或云散脂密迹洎龍王閻羅地神樹神安得稱天或鬼趣藥叉品類別故然法苑云天有四種一世間天諸國王受天福二生天四王已上至非非想三淨天須陀洹至菩薩四解義天於文義自在又婆沙論云光明照曜故名為天又天者自然自在為義若爾則雖娑竭龍身閻摩鬼趣皆受天福宮殿百寶豈非可以稱天乎舊說云云今所不取右辯通稱為天或云梵釋之尊鬼趣之劣安得同列此舊傳文今謂如常佛會八部同臨華嚴四十二眾凡聖皆列諸經廣有其文何獨至疑於此耶右辨尊劣同列近有偽書號總聖錄出十六天并韋天昔因其間曰幾世為國王幾世為長者等考之藏典並無所據又云一千二百卷在西竺一百二十卷在唐土皆不根之語若果西域有之而傳此方合有譯師翻傳之事請見者詳之右辨總聖錄偽武康德證萬歲寺比丘紹德嘗聞諸天護法多諸靈應必有傳記載其本末甲戌春偶得諸天列傳於西余山大覺寺明上座庶遂平生之願於是捨財刊梓廣其傳旹元統乙亥夏五日謹誌諸天總呪曰唵路迦路迦佉羅耶娑婆呵君大梵尊天臣諸天皆臣屬主三目摩醯為大千主帝釋主地居三十三天四王賓大辨在山澤功德在北天園中皆客寄耳男梵釋四王男天女功德辨才地神樹神鬼子母有女功德天有男散脂脩摩本迹宋高宗建炎三年己酉八月二十一日杭州上天竺惠覺法師齊璧入寂石林葉夢得銘其塔嗣子神煥甞考論諸天行位以君臣賓主男女本迹為綱目謂大梵尊天君臨三界統上冠下諸天皆其臣屬也大梵為三界主三目摩醯為大千主帝釋主地居三十三天四王主領八部雖君臣不同要各有主義若大辨在山澤功德在北天園中皆客寄耳實無所主領也梵釋四王是男天功德大辯地神樹神皆女天不可使男女失序況鬼子母有女名功德天有男名散脂脩摩今子居母上可謂之以母從子其可居天主之上乎梵釋四王本是地住菩薩金剛密迹本護千兄成佛不揣其本而齊其迹可乎知此四義然後始可與言天矣聖宗佛法源耳錄九
